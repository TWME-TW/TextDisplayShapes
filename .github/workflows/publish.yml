name: Maven Publish

on:
  push:
    branches: ["master"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          server-id: twme-repo-snapshots
          server-username: TWME_REPO_USERNAME
          server-password: TWME_REPO_PASSWORD

      - name: Build and Publish
        run: mvn -B clean deploy -DskipTests
        env:
          TWME_REPO_USERNAME: ${{ secrets.TWME_REPO_USERNAME }}
          TWME_REPO_PASSWORD: ${{ secrets.TWME_REPO_PASSWORD }}
